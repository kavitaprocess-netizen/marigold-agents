<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marigold Weddings — AI Agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#F7D44C;--gd:#C8A820;--gk:#9A7E10;--deep:#3C3010;
  --cream:#FDFAF0;--warm:#F5F0E8;--muted:#9A8A6A;--bdr:#E0D4B0;--tx:#2A2010;
}
html,body{min-height:100vh;background:var(--cream);color:var(--tx);font-family:'Playfair Display',Georgia,serif;font-size:15px;line-height:1.7}

.wrap{border-bottom:1px solid var(--bdr);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--cream);z-index:10}
.brand{display:flex;align-items:center;gap:10px}
.bname{font-size:12px;letter-spacing:3px;color:var(--deep);font-style:italic}
.step-dots{display:flex;gap:5px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--bdr);transition:all .3s}
.dot.done{background:var(--gd)}
.dot.now{background:var(--deep);width:7px;height:7px}

.tabs{display:flex;border-bottom:1px solid var(--bdr);padding:0 24px;overflow-x:auto;background:var(--cream)}
.tab{padding:10px 0;margin-right:24px;font-size:11px;letter-spacing:1.5px;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;font-family:'Playfair Display',Georgia,serif;transition:all .2s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--deep)}
.tab.on{color:var(--deep);border-bottom-color:var(--deep)}
.tab:disabled{opacity:.35;cursor:not-allowed}

.body{padding:40px 24px 80px;max-width:600px;margin:0 auto}
.screen{display:none}
.screen.on{display:block}

.ctx{background:var(--warm);border-radius:8px;padding:11px 16px;margin-bottom:32px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--deep);font-style:italic;line-height:1.5}
.ctx-edit{margin-left:auto;font-size:10px;letter-spacing:1px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:'Playfair Display',Georgia,serif;text-decoration:underline;flex-shrink:0}

/* ---- quiet progress indicator ---- */
.progress-wrap{margin-bottom:28px}
.progress-track{height:2px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;background:var(--gd);transition:width .35s ease}
.progress-label{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);font-style:italic}
.progress-edit{background:none;border:none;color:var(--muted);font-size:11px;letter-spacing:.5px;text-decoration:underline;cursor:pointer;font-family:'Playfair Display',Georgia,serif}
.start-over{background:none;border:none;color:var(--muted);font-size:11px;letter-spacing:1px;text-decoration:underline;cursor:pointer;font-family:'Playfair Display',Georgia,serif;margin-bottom:18px;display:inline-block}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ---- active question card ---- */
.qcard{animation:rise .35s ease both}
.ql{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.qt{font-size:24px;line-height:1.3;color:var(--deep);font-style:italic;font-weight:400;margin-bottom:6px}
.qs{font-size:13px;color:var(--muted);margin-bottom:18px;font-style:normal}

.pg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.p{padding:9px 18px;border-radius:100px;border:1px solid var(--bdr);font-size:14px;color:var(--tx);cursor:pointer;background:#fff;font-family:'Playfair Display',Georgia,serif;font-style:italic;transition:all .15s}
.p:hover{border-color:var(--gd);background:var(--warm)}
.p.on{border-color:var(--gk);background:var(--g);color:var(--deep);font-weight:500}

.fi{width:100%;border:none;border-bottom:1px solid var(--bdr);padding:10px 0;font-size:18px;font-family:'Playfair Display',Georgia,serif;font-style:italic;color:var(--tx);background:transparent;outline:none;transition:border-color .2s;margin-bottom:18px}
.fi:focus{border-bottom-color:var(--deep)}
.fi::placeholder{color:var(--bdr)}
textarea.fi{border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;resize:vertical;min-height:80px;font-size:14px;font-style:normal}

.qnav{display:flex;align-items:center;gap:14px}
.cta{display:inline-flex;align-items:center;gap:10px;padding:12px 26px;background:var(--deep);color:var(--cream);border:none;border-radius:100px;font-size:12px;letter-spacing:2px;cursor:pointer;font-family:'Playfair Display',Georgia,serif;font-style:italic;transition:background .2s}
.cta:hover{background:var(--gk)}
.cta:disabled{opacity:.35;cursor:not-allowed}
.arr{font-size:17px;display:inline-block;transition:transform .2s}
.cta:hover .arr{transform:translateX(4px)}
.back-link{background:none;border:none;color:var(--muted);font-size:11px;letter-spacing:1px;cursor:pointer;font-family:'Playfair Display',Georgia,serif;text-decoration:underline}

.out{margin-top:36px;padding-top:32px;border-top:1px solid var(--bdr);display:none}
.out-nav{margin-bottom:16px}
.out-back-btn{background:var(--warm);border:1px solid var(--bdr);color:var(--deep);font-size:12px;letter-spacing:.5px;padding:7px 16px;border-radius:100px;cursor:pointer;font-family:'Playfair Display',Georgia,serif;font-style:italic;transition:all .15s}
.out-back-btn:hover{background:var(--g);border-color:var(--gk)}
.out-ey{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.out-ey::after{content:'';flex:1;height:1px;background:var(--bdr)}
.out-body{font-size:14px;line-height:1.85;color:var(--tx);font-family:Georgia,serif}
.out-body.spin{color:var(--muted)}

.loading-bloom{display:flex;align-items:center;gap:12px;padding:6px 0}
.marigold-spin{animation:bloom-spin 2.2s linear infinite;vertical-align:middle}
.loading-bloom span{font-style:italic;font-size:14px;color:var(--muted);animation:pulse 1.6s ease-in-out infinite}
@keyframes bloom-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.gen-stamp{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:11px;color:var(--gk);background:var(--g);display:inline-block;padding:4px 12px;border-radius:100px;margin-bottom:18px}
.regen-note{font-size:11px;color:var(--gk);font-style:italic;background:var(--warm);border-left:2px solid var(--gd);padding:8px 12px;margin-top:12px;line-height:1.6;max-width:420px}
.truncated-note{font-size:12px;color:#8a4a1a;font-style:italic;background:#FFF3E8;border-left:2px solid #D98850;padding:9px 13px;margin-bottom:18px;line-height:1.6;border-radius:0 6px 6px 0}

.out-body h1,.out-body h2,.out-body h3{font-family:'Playfair Display',Georgia,serif;color:var(--deep);font-weight:500;font-style:italic;line-height:1.3}
.out-body h1{font-size:22px;margin:28px 0 14px}
.out-body h1:first-child{margin-top:0}
.out-body h2{font-size:18px;margin:26px 0 12px}
.out-body h2:first-child{margin-top:0}
.out-body h3{font-size:15px;margin:20px 0 8px;font-style:normal;letter-spacing:.3px}
.out-body p{margin:0 0 14px}
.out-body strong{color:var(--deep);font-weight:700}
.out-body em{font-style:italic}
.out-body ul,.out-body ol{margin:0 0 16px;padding-left:22px}
.out-body li{margin-bottom:6px}
.out-body hr{border:none;border-top:1px solid var(--bdr);margin:24px 0}
.out-table-wrap{overflow-x:auto;margin:0 0 20px;border:1px solid var(--bdr);border-radius:8px}
.out-body table{width:100%;border-collapse:collapse;font-size:13px}
.out-body th{background:var(--warm);color:var(--deep);font-weight:700;text-align:left;padding:9px 12px;border-bottom:1px solid var(--bdr);white-space:nowrap}
.out-body td{padding:9px 12px;border-bottom:1px solid var(--bdr);vertical-align:top}
.out-body tr:last-child td{border-bottom:none}
.out-body tr:nth-child(even) td{background:rgba(0,0,0,0.012)}

.out-body ul.checklist{list-style:none;padding-left:0;margin:0 0 18px}
.out-body ul.checklist li.check-item{margin-bottom:2px}
.out-body ul.checklist label{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
.out-body ul.checklist label:hover{background:var(--warm)}
.out-body ul.checklist input[type="checkbox"]{margin-top:3px;width:16px;height:16px;accent-color:var(--deep);cursor:pointer;flex-shrink:0}
.out-body ul.checklist label span{font-family:Georgia,serif;font-size:14px;line-height:1.6;transition:color .15s}
.out-body ul.checklist li.checked label span{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--bdr)}
.checklist-note{font-size:11px;color:var(--muted);font-style:italic;margin:-10px 0 18px;padding-left:10px}

.restart{margin-top:28px;text-align:center}
.restart button{background:none;border:none;color:var(--muted);font-size:11px;letter-spacing:1px;text-decoration:underline;cursor:pointer;font-family:'Playfair Display',Georgia,serif}

.choice-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
.choice-card{background:#fff;border:1px solid var(--bdr);border-radius:12px;padding:22px 20px;cursor:pointer;transition:all .18s;text-align:left}
.choice-card:hover{border-color:var(--gd);background:var(--warm)}
.choice-card .cc-title{font-size:17px;font-style:italic;color:var(--deep);margin-bottom:6px}
.choice-card .cc-sub{font-size:12px;color:var(--muted);font-style:normal;line-height:1.5}
.free-area{width:100%;border:1px solid var(--bdr);border-radius:10px;padding:16px;font-size:14px;font-family:Georgia,serif;font-style:normal;color:var(--tx);resize:vertical;min-height:160px;outline:none;background:#fff;margin-bottom:18px}
.free-area:focus{border-color:var(--gd)}
.free-hint{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:14px;line-height:1.6}
.extracted-note{background:var(--warm);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--deep);font-style:italic;margin-bottom:24px;line-height:1.6}

@media(max-width:600px){.body{padding:28px 16px 70px}.qt{font-size:21px}.choice-cards{grid-template-columns:1fr}}
</style>
</head>

<script>
/* ============ DATA MODEL ============ */
const W={p1:'',p2:'',tr:[],sz:'',loc:'',bud:'',dt:'',obs:'',ready:false,shouldAutoGeneratePlan:false};

/* Per-flow question definitions. Each question: {key, label(eyebrow), text, type, options?, placeholder?, default?, multi?, max?}
   type: 'choice' | 'text' | 'textarea' */
const FLOWS = {
  setup: [
    {key:'p1', label:'Begin here', text:'What\u2019s your first name?', type:'text', placeholder:'Your first name', default:'Rachel'},
    {key:'p2', label:'Begin here', text:'And your partner\u2019s first name?', type:'text', placeholder:'Partner\u2019s first name', default:'Arjun'},
    {key:'tr', label:'Traditions', text:'Which traditions are you celebrating?', sub:'Choose up to two \u2014 we blend them thoughtfully.', type:'choice', multi:true, max:2, options:[
      'Hindu (North Indian / Punjabi)','Jewish (Reform / Conservative)','Muslim (Nikah)','Nigerian (Yoruba)','Nigerian (Igbo)','Sikh','Western / Civil','Chinese / Taiwanese'
    ], default:['Hindu (North Indian / Punjabi)','Jewish (Reform / Conservative)']},
    {key:'sz', label:'Guest count', text:'How many guests are you imagining?', type:'choice', options:[
      'Micro (under 20 guests)','Intimate (20\u201375 guests)','Mid-size (75\u2013200 guests)','Large (200\u2013500 guests)','Grand (500+ guests)'
    ], display:{'Micro (under 20 guests)':'Under 20 \u2014 just us','Intimate (20\u201375 guests)':'20\u201375 \u2014 close family','Mid-size (75\u2013200 guests)':'75\u2013200','Large (200\u2013500 guests)':'200\u2013500','Grand (500+ guests)':'500+ \u2014 grand celebration'}, default:'Mid-size (75\u2013200 guests)'},
    {key:'loc', label:'Location', text:'Where will you celebrate?', type:'choice', options:[
      'New York / New Jersey','Chicago','Los Angeles','Destination \u2014 Italy','Destination \u2014 India','Destination \u2014 Nigeria','Destination \u2014 Morocco','Destination \u2014 Bali','Destination \u2014 Israel'
    ], default:'New York / New Jersey'},
    {key:'bud', label:'Budget', text:'What\u2019s your total budget range?', type:'choice', options:[
      'under $25,000','$25,000\u2013$50,000','$50,000\u2013$100,000','$100,000\u2013$200,000','$200,000+'
    ], default:'$50,000\u2013$100,000'},
    {key:'dt', label:'Timing', text:'When\u2019s the big day?', type:'text', placeholder:'e.g. June 2026', default:'June 2026'},

/* runtime state per flow */
const STATE = {
  setup: {idx:0, answers:{}},
  cie: {idx:0, answers:{}},
  vendor: {idx:0, answers:{}},
  inquiry: {idx:0, answers:{}},
  guest: {idx:0, answers:{}}
};

function flowDisplay(q, val){
  if(q.display){
    if(Array.isArray(val)) return val.map(v=>q.display[v]||v).join(' + ');
    return q.display[val] || val;
  }
  return Array.isArray(val) ? val.join(' + ') : val;
}

function renderTranscript(flow){
  const tEl = document.getElementById('tr-'+flow);
  const qs = FLOWS[flow];
  const st = STATE[flow];

  // count only applicable questions for an honest progress total
  const applicable = qs.filter(q => questionApplies(flow, q));
  const answeredApplicable = applicable.filter(q => st.answers[q.key] !== undefined && st.answers[q.key] !== '').length;
  const total = applicable.length;
  const pct = total ? Math.round((answeredApplicable/total)*100) : 0;

  let lastAnswered = -1;
  for(let i=st.idx-1;i>=0;i--){
    if(st.answers[qs[i].key]!==undefined && st.answers[qs[i].key]!==''){ lastAnswered = i; break; }
  }

  let html = '';
  const startOverLabel = flow==='setup' ? '\u2190 back to the beginning' : '\u2190 start over';
  html += '<button class="start-over" onclick="goTab(\'intro\',0,document.querySelectorAll(\'.tab\')[0])">'+startOverLabel+'</button>';
  html += '<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  html += '<div class="progress-label"><span>'+answeredApplicable+' of '+total+' answered</span>';
  if(lastAnswered>=0){
    html += '<button class="progress-edit" onclick="jumpTo(\''+flow+'\','+lastAnswered+')">edit last answer</button>';
  }
  html += '</div></div>';

  tEl.innerHTML = html;
}

function jumpTo(flow, i){
  STATE[flow].idx = i;
  const q = FLOWS[flow][i];
  if(STATE[flow].prefilled && q){ delete STATE[flow].prefilled[q.key]; }
  renderTranscript(flow);
  renderQuestion(flow);
}

function questionApplies(flow, q){
  if(!q.showIf) return true;
  const st = STATE[flow];
  return Object.keys(q.showIf).every(k => st.answers[k] === q.showIf[k]);
}

function renderQuestion(flow){
  const qs = FLOWS[flow];
  const st = STATE[flow];
  const card = document.getElementById('qc-'+flow);
  const outPanelIds = {cie:'cie-out', vendor:'vm-out', inquiry:'inq-out', guest:'gc-out'};

  // auto-skip questions already answered via free-text extraction, or not applicable given prior answers
  while(st.idx < qs.length && (
    (st.prefilled && st.prefilled[qs[st.idx].key]) ||
    !questionApplies(flow, qs[st.idx])
  )){
    st.idx++;
  }

  if(st.idx >= qs.length){
    // all questions answered
    card.innerHTML = '';
    if(flow==='setup'){
      finalizeSetup();
    } else {
      showRunButton(flow);
    }
    return;
  }

  // A real question is about to be shown \u2014 any previous result for this flow
  // must not still be visible alongside it, no matter how we got here.
  if(outPanelIds[flow]){
    const outEl = document.getElementById(outPanelIds[flow]);
    if(outEl) outEl.style.display = 'none';
  }

  const q = qs[st.idx];
  const existing = st.answers[q.key] !== undefined ? st.answers[q.key] : q.default;

  let inner = '<div class="ql">'+q.label+'</div><div class="qt">'+q.text+'</div>';
  if(q.sub) inner += '<div class="qs">'+q.sub+'</div>';

  if(q.type === 'choice'){
    inner += '<div class="pg" id="pg-'+flow+'-'+q.key+'">';
    q.options.forEach(opt=>{
      const isOn = q.multi ? (Array.isArray(existing) && existing.includes(opt)) : (existing===opt);
      const label = q.display ? (q.display[opt]||opt) : opt;
      inner += '<button class="p'+(isOn?' on':'')+'" data-v="'+opt.replace(/"/g,'&quot;')+'">'+label+'</button>';
    });
    inner += '</div>';
  } else if(q.type === 'textarea'){
    inner += '<textarea class="fi" id="fi-'+flow+'-'+q.key+'" placeholder="'+(q.placeholder||'')+'">'+(existing||'')+'</textarea>';
  } else {
    inner += '<input class="fi" id="fi-'+flow+'-'+q.key+'" placeholder="'+(q.placeholder||'')+'" value="'+(existing||'').replace(/"/g,'&quot;')+'">';
  }

  inner += '<div class="qnav">';
  inner += '<button class="cta" id="next-'+flow+'" onclick="advance(\''+flow+'\')">Next <span class="arr">\u2192</span></button>';
  inner += '<button class="back-link" onclick="goBack(\''+flow+'\')">\u2190 back</button>';
  inner += '</div>';

  card.innerHTML = inner;

  if(q.type === 'choice'){
    const wrap = document.getElementById('pg-'+flow+'-'+q.key);
    wrap.querySelectorAll('.p').forEach(b=>{
      b.addEventListener('click', ()=>{
        if(q.multi){
          b.classList.toggle('on');
          const sel = [...wrap.querySelectorAll('.p.on')];
          if(q.max && sel.length>q.max){ b.classList.remove('on'); }
        } else {
          wrap.querySelectorAll('.p').forEach(x=>x.classList.remove('on'));
          b.classList.add('on');
          setTimeout(()=>advance(flow), 280); // brief pause so the selection is visible before advancing
        }
      });
    });
  } else {
    const fi = document.getElementById('fi-'+flow+'-'+q.key);
    fi.focus();
    fi.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' && q.type!=='textarea'){ e.preventDefault(); advance(flow); }
    });
  }
}

function collectAnswer(flow){
  const qs = FLOWS[flow];
  const st = STATE[flow];
  const q = qs[st.idx];
  if(q.type === 'choice'){
    const wrap = document.getElementById('pg-'+flow+'-'+q.key);
    const sel = [...wrap.querySelectorAll('.p.on')].map(b=>b.dataset.v);
    if(q.multi) return sel.length ? sel : (q.default||[]);
    return sel[0] || q.default;
  } else {
    const fi = document.getElementById('fi-'+flow+'-'+q.key);
    return fi.value.trim() || q.default || '';
  }
}

function advance(flow){
  const qs = FLOWS[flow];
  const st = STATE[flow];
  const q = qs[st.idx];
  st.answers[q.key] = collectAnswer(flow);
  st.idx++;
  renderTranscript(flow);
  renderQuestion(flow);
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}

function goBack(flow){
  const st = STATE[flow];
  const qs = FLOWS[flow];
  const outPanelIds = {cie:'cie-out', vendor:'vm-out', inquiry:'inq-out', guest:'gc-out'};
  if(st.idx>0){
    st.idx--;
    while(st.idx>0 && (
      (st.prefilled && st.prefilled[qs[st.idx].key]) ||
      !questionApplies(flow, qs[st.idx])
    )){
      st.idx--;
    }
    if(outPanelIds[flow]){
      const outEl = document.getElementById(outPanelIds[flow]);
      if(outEl) outEl.style.display = 'none';
    }
    renderTranscript(flow);
    renderQuestion(flow);
    window.scrollTo({top:0, behavior:'smooth'});
  } else {
    // already at the first question \u2014 go to the previous screen in the journey
    if(outPanelIds[flow]){
      const outEl = document.getElementById(outPanelIds[flow]);
      if(outEl) outEl.style.display = 'none';
    }
    if(flow==='setup'){
      goTab('intro', 0, document.querySelectorAll('.tab')[0]);
    } else {
      goTab('setup', 0, document.querySelectorAll('.tab')[0]);
    }
  }
}

function finalizeSetup(){
  W.p1 = STATE.setup.answers.p1 || 'Partner 1';
  W.p2 = STATE.setup.answers.p2 || 'Partner 2';
  W.tr = STATE.setup.answers.tr || [];
  W.sz = STATE.setup.answers.sz || '';
  W.loc = STATE.setup.answers.loc || '';
  W.bud = STATE.setup.answers.bud || '';
  W.dt = STATE.setup.answers.dt || '';
  W.obs = STATE.setup.answers.obs || '';
  W.ready = true;
  W.shouldAutoGeneratePlan = true;
  ['tab-cie','tab-vendor','tab-inquiry','tab-guest'].forEach(id=>document.getElementById(id).disabled=false);
  syncCtx();
  document.getElementById('qc-setup').innerHTML = '<div class="qt" style="margin-bottom:18px">All set, '+W.p1+' & '+W.p2+'.</div><button class="cta" onclick="goTab(\'cie\',1,document.querySelectorAll(\'.tab\')[1])">See your plan <span class="arr">\u2192</span></button>';
}

function showRunButton(flow){
  const freshLabels = {cie:'Generate my plan', vendor:'Find vendors', inquiry:'Draft my message', guest:'Draft message'};
  const regenLabels = {cie:'Regenerate my plan', vendor:'Search again', inquiry:'Redraft my message', guest:'Redraft message'};
  let label = freshLabels[flow];
  if(flow==='vendor' && STATE.vendor.answers.source==='bring my own'){
    label = STATE.vendor.generatedAt ? 'Resend invite' : 'Send invite';
  } else if(STATE[flow].generatedAt){
    label = regenLabels[flow];
  }

  const card = document.getElementById('qc-'+flow);
  let html = '<button class="cta" id="run-'+flow+'" onclick="runFlow(\''+flow+'\')">'+label+' <span class="arr">\u2192</span></button>'+
    '<div style="margin-top:14px"><button class="back-link" onclick="goBack(\''+flow+'\')">edit answers</button></div>';
  if(STATE[flow].generatedAt){
    html += '<div class="regen-note">You already generated a result below \u2014 clicking this will replace it with a new version, which may come out a little different each time.</div>';
  }
  card.innerHTML = html;

  // The plan generates itself automatically the first time the couple reaches this
  // screen with all setup questions answered \u2014 no extra click required.
  if(flow==='cie' && W.shouldAutoGeneratePlan && !STATE.cie.generatedAt){
    W.shouldAutoGeneratePlan = false;
    runFlow('cie');
  }
}

function setDots(i){
  [0,1,2,3].forEach(j=>{
    const d=document.getElementById('d'+j);
    d.className='dot';
    if(j<i)d.classList.add('done');
    if(j===i)d.classList.add('now');
  });
}

function goTab(id, di, tabEl){
  if(id!=='setup' && id!=='intro' && !W.ready) return;
  ['intro','setup','cie','vendor','inquiry','guest'].forEach(x=>{
    const el=document.getElementById('s-'+x);
    if(el){el.style.display='none';el.classList.remove('on');}
  });
  const el=document.getElementById('s-'+id);
  if(el){el.style.display='block';el.classList.add('on');}
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(tabEl) tabEl.classList.add('on');
  setDots(di);
  syncCtx();
  if(id==='intro'){
    renderIntro();
  } else if(id!=='setup'){
    renderTranscript(id);
    renderQuestion(id);
  }
  window.scrollTo(0,0);
}

function syncCtx(){
  if(!W.ready) return;
  const sum=W.p1+' & '+W.p2+' \u00b7 '+W.tr.join(' + ')+' \u00b7 '+W.sz.split('(')[0].trim()+' \u00b7 '+W.loc.replace('Destination \u2014 ','')+' \u00b7 '+W.dt;
  ['cie','vendor','inquiry','guest'].forEach(id=>{
    const elc=document.getElementById('ctx-'+id);
    if(!elc)return;
    elc.innerHTML=sum+'<button class="ctx-edit" onclick="goTab(\'setup\',0,document.querySelectorAll(\'.tab\')[0])">edit details</button>';
  });
}

function simpleHash(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){
    hash = ((hash<<5)-hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash).toString(36);
}

function onChecklistToggle(input){
  const li = input.closest('li');
  li.classList.toggle('checked', input.checked);
  try{
    if(input.checked){ localStorage.setItem(input.dataset.key, '1'); }
    else { localStorage.removeItem(input.dataset.key); }
  }catch(e){ /* localStorage unavailable \u2014 state just won't persist across reloads */ }
}

function renderMD(src, opts){
  opts = opts || {};
  if(!src) return '';
  let s = src.replace(/\r\n/g,'\n');
  s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const lines = s.split('\n');
  let html = '';
  let i = 0;
  let inList = null;
  let inChecklist = false;
  let cbCounter = 0;
  const idPrefix = opts.idPrefix || 'cb';

  function closeList(){
    if(inList){
      const wasChecklist = inChecklist;
      html += inList==='ul' ? '</ul>' : '</ol>';
      if(wasChecklist){ html += '<p class="checklist-note">Saved to this browser \u2014 your checkmarks will still be here next time you open this page on this device.</p>'; }
      inList = null; inChecklist = false;
    }
  }

  function inline(t){
    t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    return t;
  }

  while(i < lines.length){
    let line = lines[i];

    if(/^\s*\|?.+\|.+\|?\s*$/.test(line) && lines[i+1] && /^\s*\|?[\s:|-]+\|[\s:|-]*\|?\s*$/.test(lines[i+1])){
      closeList();
      const headCells = line.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim());
      let body = [];
      i += 2;
      while(i < lines.length){
        if(/\|/.test(lines[i]) && lines[i].trim() !== ''){
          body.push(lines[i].trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim()));
          i++;
        } else if(lines[i].trim()==='' && lines[i+1] && /\|/.test(lines[i+1]) && lines[i+1].trim() !== ''){
          // a blank line sitting between table rows is common model formatting drift \u2014
          // skip it and keep the table going rather than treating it as the table's end
          i++;
        } else {
          break;
        }
      }
      html += '<div class="out-table-wrap"><table><thead><tr>' +
        headCells.map(c=>'<th>'+inline(c)+'</th>').join('') +
        '</tr></thead><tbody>' +
        body.map(r=>'<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>').join('') +
        '</tbody></table></div>';
      continue;
    }

    let m;
    if((m = /^###\s+(.*)$/.exec(line))){ closeList(); inChecklist = opts.checklistMode && /checklist|to-?do|tasks/i.test(m[1]); html += '<h3>'+inline(m[1])+'</h3>'; i++; continue; }
    if((m = /^##\s+(.*)$/.exec(line))){ closeList(); inChecklist = opts.checklistMode && /checklist|to-?do|tasks/i.test(m[1]); html += '<h2>'+inline(m[1])+'</h2>'; i++; continue; }
    if((m = /^#\s+(.*)$/.exec(line))){ closeList(); inChecklist = opts.checklistMode && /checklist|to-?do|tasks/i.test(m[1]); html += '<h1>'+inline(m[1])+'</h1>'; i++; continue; }

    if(/^\s*---+\s*$/.test(line)){ closeList(); html += '<hr>'; i++; continue; }

    if((m = /^\s*[-*]\s+(.*)$/.exec(line))){
      if(inList !== 'ul'){ closeList(); html += inChecklist ? '<ul class="checklist">' : '<ul>'; inList = 'ul'; }
      if(inChecklist){
        cbCounter++;
        const cid = idPrefix+'-'+cbCounter;
        const itemKey = 'marigold-checklist:'+simpleHash(m[1]);
        let isChecked = false;
        try{ isChecked = localStorage.getItem(itemKey) === '1'; }catch(e){}
        html += '<li class="check-item'+(isChecked?' checked':'')+'"><label><input type="checkbox" id="'+cid+'" data-key="'+itemKey+'"'+(isChecked?' checked':'')+' onchange="onChecklistToggle(this)"><span>'+inline(m[1])+'</span></label></li>';
      } else {
        html += '<li>'+inline(m[1])+'</li>';
      }
      i++; continue;
    }

    if((m = /^\s*\d+\.\s+(.*)$/.exec(line))){
      if(inList !== 'ol'){ closeList(); html += '<ol>'; inList = 'ol'; }
      html += '<li>'+inline(m[1])+'</li>';
      i++; continue;
    }

    if(/^\s*$/.test(line)){ closeList(); i++; continue; }

    closeList();
    let para = [line];
    i++;
    while(i < lines.length && lines[i].trim() !== '' &&
          !/^#{1,3}\s/.test(lines[i]) && !/^\s*[-*]\s/.test(lines[i]) &&
          !/^\s*\d+\.\s/.test(lines[i]) && !/^\s*\|.+\|\s*$/.test(lines[i]) &&
          !/^\s*---+\s*$/.test(lines[i])){
      para.push(lines[i]); i++;
    }
    html += '<p>'+inline(para.join(' '))+'</p>';
  }
  closeList();
  return html;
}

/* ============ CONTEXT STRING FOR PROMPTS ============ */
function ctx(){
  const isIF = W.tr.length>1;
  const isDest = W.loc.toLowerCase().includes('destination');
  return ['WEDDING CONTEXT:','Couple: '+W.p1+' and '+W.p2,'Traditions: '+W.tr.join(' + ')+(isIF?' \u2014 INTERFAITH WEDDING':''),'Size: '+W.sz,'Budget: '+W.bud,'Date: '+W.dt,'Location: '+W.loc,'Observance: '+W.obs,
    isDest?'DESTINATION WEDDING \u2014 apply all destination checks: legal marriage recognition, visa requirements for international guests, travel advisory monitoring, Stripe market availability, currency risk.':'',
    isIF?'INTERFAITH WEDDING \u2014 include a "Conflict flags" section: decisions the couple must make together, framed as choices not problems.':''
  ].filter(Boolean).join('\n');
}

/* ============ API CALL ============ */
async function ask(sys,usr,resId,outId,btnId,lbl,renderOpts,flow,maxTokens){
  const btn=document.getElementById(btnId);
  const out=document.getElementById(outId);
  const res=document.getElementById(resId);
  if(btn){btn.disabled=true; btn.innerHTML='Thinking\u2026 <span class="arr">\u00b7</span>';}
  out.style.display='block';
  res.className='out-body spin';
  res.innerHTML='<div class="loading-bloom">'+marigoldSpinnerSVG(34)+'<span>Writing\u2026</span></div>';
  try{
    const r=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:(maxTokens||1000),system:sys,messages:[{role:'user',content:usr}]})
    });
    if(!r.ok){
      const txt=await r.text();
      throw new Error('Server responded with '+r.status+': '+txt.slice(0,120));
    }
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    res.className='out-body';
    const raw=(d.content||[]).map(b=>b.text||'').join('');
    const timeStamp = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    let stampHTML = '<p class="gen-stamp">Generated just now \u00b7 '+timeStamp+'</p>';
    if(d.stop_reason === 'max_tokens'){
      stampHTML += '<p class="truncated-note">\u26a0 This response was cut off because it ran long. Try "Regenerate" \u2014 it may come out shorter and complete, or ask to focus on one section at a time.</p>';
    }
    res.innerHTML = stampHTML + renderMD(raw, renderOpts);
    if(flow){ STATE[flow].generatedAt = Date.now(); }
  }catch(e){
    res.className='out-body';
    res.innerHTML='<p style="color:var(--muted);font-style:italic">\u26a0 '+String(e.message).replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</p>';
  }
  if(btn){btn.disabled=false; btn.innerHTML=lbl+' <span class="arr">\u2192</span>';}
  if(flow){ showRunButton(flow); }
  out.scrollIntoView({behavior:'smooth', block:'start'});
}

For "sz", "loc", "bud", and "obs": you MUST return the exact bucket label string from the allowed list below, copied verbatim \u2014 never the user's raw number or phrase. For example if the text says "around 120 guests", you must map that to the bucket it falls into ("Mid-size (75\u2013200 guests)") and return that exact string, not "120 guests". If a number or detail doesn't clearly fall into one of the listed buckets, return null for that field rather than guessing or inventing a new label.

Fields to extract (use null for any not mentioned or unclear \u2014 do not guess):
{

Correct output: {"p1":"Rachel","p2":"Arjun","tr":null,"sz":"Mid-size (75\u2013200 guests)","loc":"New York / New Jersey","bud":"$50,000\u2013$100,000","dt":"June 2026","obs":"moderately observant"}

function extractJSONObject(raw){
  const firstBrace = raw.indexOf('{');
  const lastBrace = raw.lastIndexOf('}');
  if(firstBrace === -1 || lastBrace === -1 || lastBrace < firstBrace){
    throw new Error('No JSON object found in model response: '+raw.slice(0,200));
  }
  const candidate = raw.slice(firstBrace, lastBrace+1);
  return JSON.parse(candidate);
}

function applyExtracted(parsed, originalText){
  const norm = s => String(s).replace(/[\u2010-\u2015]/g, '-').trim().toLowerCase();

  const validOptions = {
    sz: FLOWS.setup.find(q=>q.key==='sz').options,
    loc: FLOWS.setup.find(q=>q.key==='loc').options,
    bud: FLOWS.setup.find(q=>q.key==='bud').options,
    obs: FLOWS.setup.find(q=>q.key==='obs').options,
    tr: FLOWS.setup.find(q=>q.key==='tr').options
  };

  function matchOption(val, optionsList){
    if(typeof val !== 'string') return null;
    const target = norm(val);
    return optionsList.find(o => norm(o) === target) || null;
  }

  // Fallback: if the model ignored instructions and returned a raw number instead
  // of the bucket label (e.g. "120 guests" instead of "Mid-size (75-200 guests)"),
  // try to recover by matching the number into the right range.
  function matchSizeByNumber(val){
    if(typeof val !== 'string') return null;
    const n = parseInt(val.replace(/[^\d]/g,''), 10);
    if(isNaN(n)) return null;
    if(n < 20) return validOptions.sz.find(o=>o.startsWith('Micro'));
    if(n <= 75) return validOptions.sz.find(o=>o.startsWith('Intimate'));
    if(n <= 200) return validOptions.sz.find(o=>o.startsWith('Mid-size'));
    if(n <= 500) return validOptions.sz.find(o=>o.startsWith('Large'));
    return validOptions.sz.find(o=>o.startsWith('Grand'));
  }

  function matchBudgetByNumber(val){
    if(typeof val !== 'string') return null;
    const n = parseInt(val.replace(/[^\d]/g,''), 10);
    if(isNaN(n)) return null;
    if(n < 25000) return validOptions.bud.find(o=>o.startsWith('under'));
    if(n <= 50000) return validOptions.bud.find(o=>o.startsWith('$25,000'));
    if(n <= 100000) return validOptions.bud.find(o=>o.startsWith('$50,000'));
    if(n <= 200000) return validOptions.bud.find(o=>o.startsWith('$100,000'));
    return validOptions.bud.find(o=>o.startsWith('$200,000'));
  }

  STATE.setup.idx = 0;
  STATE.setup.answers = {};
  STATE.setup.prefilled = {};

  let filledCount = 0;
  let missingLabels = [];

  FLOWS.setup.forEach(q=>{
    const val = parsed[q.key];
    let ok = false;
    if(q.key==='tr' && Array.isArray(val) && val.length){
      const cleaned = val.map(v=>matchOption(v, validOptions.tr)).filter(Boolean).slice(0,2);
      if(cleaned.length){ STATE.setup.answers.tr = cleaned; ok = true; }
    } else if(['sz','loc','bud','obs'].includes(q.key) && val){
      let matched = matchOption(val, validOptions[q.key]);
      if(!matched && q.key==='sz'){ matched = matchSizeByNumber(val); }
      if(!matched && q.key==='bud'){ matched = matchBudgetByNumber(val); }
      if(matched){ STATE.setup.answers[q.key] = matched; ok = true; }
    } else if(['p1','p2','dt'].includes(q.key) && typeof val==='string' && val.trim()){
      STATE.setup.answers[q.key] = val.trim(); ok = true;
    }
    if(ok){ STATE.setup.prefilled[q.key] = true; filledCount++; }
    else { missingLabels.push(q.text); }
  });

  goTabRaw('setup');
  const noteHTML = missingLabels.length
    ? '<div class="extracted-note">Got it \u2014 we picked up '+filledCount+' of '+FLOWS.setup.length+' details. Just a couple more things to confirm.</div>'
    : '<div class="extracted-note">Got it \u2014 we picked up everything we need from that.</div>';

  renderTranscript('setup');
  renderQuestion('setup');
  document.getElementById('qc-setup').insertAdjacentHTML('afterbegin', noteHTML);
}

/* ============ INIT ============ */
renderIntro();
</script>
